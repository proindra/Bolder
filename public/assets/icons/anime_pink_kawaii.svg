<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGradient" x1="250" y1="100" x2="250" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#F06292"/>
    </linearGradient>
    <linearGradient id="paperGradient" x1="50" y1="114" x2="450" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FCE4EC"/>
    </linearGradient>
  </defs>

  <g id="anime-folder-pink">
    <!-- 1. Folder Body -->
    <rect x="50" y="100" width="400" height="300" rx="18" fill="url(#bodyGradient)" />

    <!-- 2. Paper Strip -->
    <rect x="50" y="100" width="400" height="28" rx="6" fill="url(#paperGradient)" />

    <!-- 3. Tab -->
    <path d="M50 100 H190 L175 57 C172 49 165 45 158 45 H68 C60 45 53 49 50 57 V100Z" fill="#D81B60" />

    <!-- Anime Sticker: Heart -->
    <path d="M110 320 C110 315 115 310 125 310 C135 310 140 315 140 320 C140 330 110 350 110 350 C110 350 80 330 80 320 C80 315 85 310 95 310 C105 310 110 315 110 320Z" fill="#FFFFFF" opacity="0.8" />
    <text x="300" y="360" font-family="sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold" opacity="0.9">K-On!</text>
  </g>
</svg>