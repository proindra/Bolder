<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGradient" x1="250" y1="100" x2="250" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="paperGradient" x1="50" y1="114" x2="450" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>

  <g id="anime-folder-action">
    <!-- 1. Folder Body -->
    <rect x="50" y="100" width="400" height="300" rx="18" fill="url(#bodyGradient)" />

    <!-- 2. Paper Strip -->
    <rect x="50" y="100" width="400" height="28" rx="6" fill="url(#paperGradient)" />

    <!-- 3. Tab -->
    <path d="M50 100 H190 L175 57 C172 49 165 45 158 45 H68 C60 45 53 49 50 57 V100Z" fill="#2E7D32" />

    <!-- Shonen Lightning Bolt Sticker -->
    <path d="M380 320 L350 350 L370 350 L340 380 L390 340 L370 340 L400 310 Z" fill="#FFEB3B" />
    <circle cx="100" cy="350" r="30" fill="white" opacity="0.3" />
    <path d="M90 340 L110 360 M110 340 L90 360" stroke="white" stroke-width="4" />
  </g>
</svg>