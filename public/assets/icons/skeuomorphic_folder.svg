<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Body Gradient: top #FFD740 to bottom #FFC107 -->
    <linearGradient id="bodyGradient" x1="250" y1="100" x2="250" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD740"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    
    <!-- Paper Strip Gradient: left #FFFFFF to right #E0E0E0 -->
    <linearGradient id="paperGradient" x1="50" y1="114" x2="450" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DCDCDC"/>
    </linearGradient>
  </defs>

  <g id="folder-icon">
    <!-- 1. Folder Body (Back layer) -->
    <!-- Positioned to be centered in the 500x500 canvas -->
    <!-- Width: 400, Height: 300. Center-ish y: 100 to 400. Center-ish x: 50 to 450. -->
    <rect x="50" y="100" width="400" height="300" rx="18" fill="url(#bodyGradient)" />

    <!-- 2. Paper Strip (Middle layer) -->
    <!-- Positioned at the top interior of the body -->
    <!-- Height: 28px, Width: full 400. Just below the tab area. -->
    <rect x="50" y="100" width="400" height="28" rx="6" fill="url(#paperGradient)" />

    <!-- 3. Tab (Top layer) -->
    <!-- Positioned at top-left. Starts at x=50. Width: ~35% of 400 = 140px. Height: 55px. -->
    <!-- Shape: Custom path for rounded trapezoid feel -->
    <!-- Bottom starts at y=100. Tab rises up to y=45. -->
    <path d="M50 100 H190 L175 57 C172 49 165 45 158 45 H68 C60 45 53 49 50 57 V100Z" fill="#F9A825" />
  </g>
</svg>