<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGradient" x1="250" y1="100" x2="250" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DCEDC8"/>
      <stop offset="100%" stop-color="#AED581"/>
    </linearGradient>
    <linearGradient id="paperGradient" x1="50" y1="114" x2="450" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1F8E9"/>
    </linearGradient>
  </defs>

  <g id="anime-folder-zen">
    <!-- 1. Folder Body -->
    <rect x="50" y="100" width="400" height="300" rx="18" fill="url(#bodyGradient)" />

    <!-- 2. Paper Strip -->
    <rect x="50" y="100" width="400" height="28" rx="6" fill="url(#paperGradient)" />

    <!-- 3. Tab -->
    <path d="M50 100 H190 L175 57 C172 49 165 45 158 45 H68 C60 45 53 49 50 57 V100Z" fill="#689F38" />

    <!-- Bamboo Leaf Sticker -->
    <path d="M350 360 Q380 340 400 300 Q360 320 350 360" fill="#33691E" />
    <path d="M340 370 Q370 350 390 310 Q350 330 340 370" fill="#33691E" opacity="0.6" />
    
    <!-- Zen Text/Symbol -->
    <text x="80" y="360" font-family="serif" font-size="32" fill="#33691E" font-weight="bold" opacity="0.7">禅</text>
  </g>
</svg>