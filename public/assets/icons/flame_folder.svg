<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGradient" x1="250" y1="100" x2="250" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#D84315"/>
    </linearGradient>
    <linearGradient id="paperGradient" x1="50" y1="114" x2="450" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFEBEE"/>
    </linearGradient>
  </defs>

  <g id="anime-folder-fire">
    <!-- 1. Folder Body -->
    <rect x="50" y="100" width="400" height="300" rx="18" fill="url(#bodyGradient)" />

    <!-- 2. Paper Strip -->
    <rect x="50" y="100" width="400" height="28" rx="6" fill="url(#paperGradient)" />

    <!-- 3. Tab -->
    <path d="M50 100 H190 L175 57 C172 49 165 45 158 45 H68 C60 45 53 49 50 57 V100Z" fill="#BF360C" />

    <!-- Flame Sticker -->
    <path d="M360 370 C360 370 340 350 340 320 C340 290 360 270 360 270 C360 270 380 290 380 320 C380 350 360 370 360 370Z" fill="#FFEB3B" opacity="0.9" />
    <path d="M360 360 C360 360 350 350 350 330 C350 310 360 300 360 300 C360 300 370 310 370 330 C370 350 360 360 360 360Z" fill="#F44336" opacity="0.8" />
    
    <!-- Action Lines -->
    <path d="M80 340 L120 340" stroke="#FFAB91" stroke-width="4" stroke-linecap="round" />
    <path d="M80 355 L110 355" stroke="#FFAB91" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>