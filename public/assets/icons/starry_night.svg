<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGradient" x1="250" y1="100" x2="250" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#102027"/>
    </linearGradient>
    <linearGradient id="paperGradient" x1="50" y1="114" x2="450" y2="114" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E1F5FE"/>
      <stop offset="100%" stop-color="#B3E5FC"/>
    </linearGradient>
  </defs>

  <g id="anime-folder-night">
    <!-- 1. Folder Body -->
    <rect x="50" y="100" width="400" height="300" rx="18" fill="url(#bodyGradient)" />

    <!-- 2. Paper Strip -->
    <rect x="50" y="100" width="400" height="28" rx="6" fill="url(#paperGradient)" />

    <!-- 3. Tab -->
    <path d="M50 100 H190 L175 57 C172 49 165 45 158 45 H68 C60 45 53 49 50 57 V100Z" fill="#000A12" />

    <!-- Star Stickers -->
    <path d="M370 320 L375 335 L390 335 L378 345 L383 360 L370 350 L357 360 L362 345 L350 335 L365 335 Z" fill="#FFF59D" />
    <circle cx="100" cy="340" r="4" fill="#81D4FA" />
    <circle cx="130" cy="360" r="3" fill="#81D4FA" opacity="0.6" />
    <circle cx="90" cy="370" r="2" fill="#81D4FA" opacity="0.4" />
    
    <!-- Magical Aura -->
    <rect x="70" y="150" width="80" height="4" rx="2" fill="#81D4FA" opacity="0.3" />
  </g>
</svg>